site_name: monarch-money-tools
site_description: CLI for Monarch Money transaction categorization, cleanup, and rule management.
site_url: https://nbellowe.com/monarch-money-tools/
repo_url: https://github.com/nbellowe/monarch-money-tools
repo_name: nbellowe/monarch-money-tools
docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Workflows: workflows.md
  - Categorization Cleanup: categorization.md
  - Commands: commands.md
  - Privacy & Security: privacy-security.md
  - Troubleshooting: troubleshooting.md

exclude_docs: |
  superpowers/**

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
